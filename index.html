<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luthfi & Jasmine Wedding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --sage:#8B9E7C;
  --sage-light:#A8B99A;
  --cream:#F5F0E8;
  --cream-dark:#E8E0D4;
  --gold:#B8965A;
  --text-dark:#3D3D3D;
}

*{
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  background:var(--cream);
  color:var(--text-dark);
  font-family:'Montserrat',sans-serif;
  overflow-x:hidden;
}

body.locked{
  overflow:hidden;
  height:100vh;
  touch-action:none;
}

/* =========================
   OPENING
========================= */

#opening{
  position:fixed;
  inset:0;
  z-index:9999;

  min-height:100vh;
  min-height:100dvh;

  display:flex;
  align-items:center;
  justify-content:center;

  text-align:center;
  overflow:hidden;

  background-image:
    linear-gradient(
      to bottom,
      rgba(245,240,232,.60),
      rgba(245,240,232,.90)
    ),
    url("images/655904691_18077009756568712_8566205122460984825_n.webp");

  background-size:cover;
  background-position:center;
}

.opening-content{
  position:relative;
  z-index:2;
  padding:24px;
  animation:fadeIn 1.2s ease forwards;
}

.opening-subtitle{
  margin-bottom:16px;
  color:var(--sage);
  font-size:13px;
  font-weight:500;
  letter-spacing:.3em;
  text-transform:uppercase;
}

.opening-title{
  margin:0;
  color:var(--text-dark);
  font-family:'Playfair Display',serif;
  font-size:clamp(34px,8vw,58px);
  font-weight:700;
  line-height:1.2;
}

.opening-line{
  width:64px;
  height:1px;
  margin:24px auto;
  background:var(--gold);
}

.opening-date{
  color:var(--sage);
  font-size:15px;
  font-weight:300;
  letter-spacing:.2em;
}

.open-button{
  margin-top:38px;
  min-width:170px;
  padding:14px 30px;

  border:none;
  border-radius:30px;

  background:#7f917b;
  color:white;

  font-family:'Montserrat',sans-serif;
  font-size:12px;
  font-weight:500;
  letter-spacing:1.5px;

  cursor:pointer;

  box-shadow:0 8px 20px rgba(70,80,70,.15);

  transition:.3s ease;
}

.open-button:hover{
  background:#6f816c;
  transform:translateY(-2px);
}

#opening.hide{
  animation:openingOut .8s ease forwards;
  pointer-events:none;
}

@keyframes openingOut{
  to{
    opacity:0;
    visibility:hidden;
  }
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(15px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* =========================
   MAIN
========================= */

#mainContent{
  display:none;
}

#mainContent.show{
  display:block;
  animation:fadeIn 1s ease;
}

section{
  width:100%;
}

.container{
  width:min(100% - 48px,900px);
  margin:auto;
}

.section{
  padding:80px 0;
}

.section-title{
  margin:0 0 40px;

  text-align:center;

  font-family:'Playfair Display',serif;
  font-size:28px;
  font-weight:600;

  color:var(--text-dark);
}

/* =========================
   STORY
========================= */

.story{
  text-align:center;
}

.story p{
  max-width:650px;
  margin:auto;

  color:#5a5a5a;

  font-size:15px;
  line-height:1.9;
}

/* =========================
   COUPLE PHOTO
========================= */

.couple-photo{
  width:100%;
  max-height:600px;

  display:block;

  object-fit:cover;
}

/* =========================
   GLASS
========================= */

.glass{
  background:rgba(255,255,255,.7);

  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  border:1px solid rgba(255,255,255,.4);

  box-shadow:0 10px 30px rgba(60,60,60,.04);
}

/* =========================
   EVENTS
========================= */

.events-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
